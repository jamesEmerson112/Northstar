<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drone Management</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="map"></div>
<aside id="panel">
  <h1>Drone <span id="d-id">—</span></h1>
  <p class="status"><span id="d-online">offline</span> · mode <span id="d-mode">—</span> · armed <span id="d-armed">—</span></p>
  <dl>
    <dt>lat</dt><dd id="d-lat">—</dd>
    <dt>lon</dt><dd id="d-lon">—</dd>
    <dt>alt (rel)</dt><dd id="d-alt">— m</dd>
    <dt>heading</dt><dd id="d-hdg">— °</dd>
    <dt>battery</dt><dd id="d-batt">— %</dd>
    <dt>gps</dt><dd id="d-gps">— sats</dd>
    <dt>last cmd ack</dt><dd id="d-ack">—</dd>
  </dl>
  <div class="buttons">
    <button data-cmd="arm">Arm</button>
    <button data-cmd="disarm">Disarm</button>
    <button data-cmd="takeoff">Takeoff (20 m)</button>
    <button data-cmd="land">Land</button>
  </div>
  <div class="modes">
    <label>Mode
      <select id="mode-select">
        <option value="MANUAL">MANUAL</option>
        <option value="AUTO">AUTO</option>
        <option value="RTL">RTL</option>
      </select>
    </label>
    <button id="mode-apply">Apply</button>
  </div>
  <label class="goto">
    <input type="checkbox" id="goto-toggle"> Click map to move (dodge)
  </label>
  <div class="navigate">
    <h2>Navigate (roads)</h2>
    <input type="text" id="nav-from" placeholder="From address" autocomplete="off">
    <input type="text" id="nav-to" placeholder="To address" autocomplete="off">
    <button id="nav-go">Go</button>
    <button id="nav-cancel" class="secondary">Cancel</button>
  </div>
  <div class="cua">
    <h2>Northstar (CUA)</h2>
    <p class="cua-status" id="cua-status">idle</p>
    <p class="cua-task" id="cua-task"></p>
    <p class="cua-action" id="cua-action">—</p>
    <div class="cua-thumbs">
      <img id="cua-thumb-0" alt="">
      <img id="cua-thumb-1" alt="">
      <img id="cua-thumb-2" alt="">
    </div>
  </div>
  <div class="view-toggle">
    <button data-view="hybrid">Hybrid</button>
    <button data-view="roadmap">Map</button>
    <button data-view="satellite">Satellite</button>
    <button id="tilt-toggle">Tilt 3D</button>
  </div>
  <p class="map-tip">Tilt / rotate: <kbd>Shift</kbd> + two-finger drag on the map.</p>
  <p class="hint" id="hint">connecting…</p>
</aside>
<script src="/static/app.js"></script>
</body>
</html>
